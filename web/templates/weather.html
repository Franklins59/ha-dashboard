<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>franklins dash — Wetterstation</title>
  <link rel="icon" href="/static/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/weather.css">
  <script src="/static/lib/chart.umd.min.js"></script>
</head>
<body data-theme="dark">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <a href="/" class="back-btn" title="Zurück zum Dashboard">←</a>
      <img src="/static/logo.png" class="header-logo" alt="franklins">
      <div class="header-title">Wetterstation</div>
    </div>
    <div class="header-right">
      <div class="wx-range-btns">
        <button class="wx-range-btn active" data-hours="24" onclick="setRange(24)">24h</button>
        <button class="wx-range-btn" data-hours="48" onclick="setRange(48)">48h</button>
        <button class="wx-range-btn" data-hours="168" onclick="setRange(168)">7d</button>
      </div>
      <span class="header-clock" id="clock"></span>
    </div>
  </div>

  <!-- Content -->
  <div class="wx-content">
    <!-- Instant values -->
    <div class="wx-current" id="wx-current">
      <div class="wx-card">
        <div class="wx-card-icon">🌡️</div>
        <div class="wx-card-value" id="wx-temp">—</div>
        <div class="wx-card-label">Temperatur</div>
      </div>
      <div class="wx-card">
        <div class="wx-card-icon">💧</div>
        <div class="wx-card-value" id="wx-humidity">—</div>
        <div class="wx-card-label">Feuchtigkeit</div>
      </div>
      <div class="wx-card">
        <div class="wx-card-icon">💨</div>
        <div class="wx-card-value" id="wx-wind">—</div>
        <div class="wx-card-label">Wind</div>
      </div>
      <div class="wx-card">
        <div class="wx-card-icon">🧭</div>
        <div class="wx-card-value" id="wx-wind-dir">—</div>
        <div class="wx-card-label">Windrichtung</div>
      </div>
      <div class="wx-card">
        <div class="wx-card-icon">💡</div>
        <div class="wx-card-value" id="wx-lux">—</div>
        <div class="wx-card-label">Helligkeit</div>
      </div>
    </div>

    <!-- Cumulative values with period toggle -->
    <div class="wx-cumulative">
      <div class="wx-cum-periods">
        <button class="wx-cum-btn active" data-period="daily" onclick="setCumPeriod('daily')">Heute</button>
        <button class="wx-cum-btn" data-period="weekly" onclick="setCumPeriod('weekly')">Woche</button>
        <button class="wx-cum-btn" data-period="monthly" onclick="setCumPeriod('monthly')">Monat</button>
        <button class="wx-cum-btn" data-period="total" onclick="setCumPeriod('total')">Gesamt</button>
      </div>
      <div class="wx-cum-cards">
        <div class="wx-card wx-card-cum">
          <div class="wx-card-icon">🌧️</div>
          <div class="wx-card-value" id="wx-rain">—</div>
          <div class="wx-card-label" id="wx-rain-label">Niederschlag heute</div>
          <button class="wx-reset-btn" id="reset-rain" onclick="resetMeters('rain')" title="Zähler zurücksetzen">↺</button>
        </div>
        <div class="wx-card wx-card-cum">
          <div class="wx-card-icon">☀️</div>
          <div class="wx-card-value" id="wx-sun">—</div>
          <div class="wx-card-label" id="wx-sun-label">Sonnenschein heute</div>
          <button class="wx-reset-btn" id="reset-sun" onclick="resetMeters('sun')" title="Zähler zurücksetzen">↺</button>
        </div>
      </div>
    </div>

    <!-- Indoor vs outdoor temp comparison -->
    <div class="wx-indoor-strip" id="wx-indoor">
      <span class="wx-indoor-label">Innen:</span>
      <span class="wx-indoor-items" id="wx-indoor-items">—</span>
    </div>

    <!-- Charts -->
    <div class="wx-charts">
      <div class="wx-chart-container">
        <div class="wx-chart-title">Temperatur (aussen / innen)</div>
        <canvas id="chart-temp"></canvas>
      </div>
      <div class="wx-chart-container">
        <div class="wx-chart-title">Luftfeuchtigkeit</div>
        <canvas id="chart-humidity"></canvas>
      </div>
      <div class="wx-chart-container">
        <div class="wx-chart-title">Wind</div>
        <canvas id="chart-wind"></canvas>
      </div>
      <div class="wx-chart-container">
        <div class="wx-chart-title">Niederschlag (kumulativ)</div>
        <canvas id="chart-rain"></canvas>
      </div>
    </div>
  </div>

  <script>
    // === STATE ===
    let settings = null;
    let weatherCfg = null;  // { room, utility_meters }
    let outdoor = {};       // { temp, humidity, wind_speed, wind_dir, rain, sun, lux }
    let indoorRooms = [];   // [{ name, temp_id, hum_id }]
    let allEntities = [];
    let currentRange = 24;
    let currentPeriod = "daily";
    let charts = {};

    const PERIOD_LABELS = {
      daily: "heute", weekly: "diese Woche", monthly: "diesen Monat", total: "gesamt"
    };

    const INDOOR_COLORS = ["#3ddc84", "#5ba8f5", "#a78bfa", "#f87171", "#fbbf24", "#f472b6", "#34d399", "#fb923c"];

    // === AUTO-DETECT OUTDOOR SENSORS ===
    // Finds a common prefix from sensor entities in the room, then searches
    // all HA entities matching that prefix for weather-related sensors.
    function detectOutdoorEntities(roomDevices, haEntities) {
      const sensorIds = roomDevices
        .filter(d => d.entity_id.startsWith("sensor."))
        .map(d => d.entity_id);

      if (sensorIds.length === 0) return {};

      // Find common prefix among sensor entity_ids
      let prefix = sensorIds[0];
      for (const id of sensorIds.slice(1)) {
        while (prefix.length > 0 && !id.startsWith(prefix)) {
          prefix = prefix.substring(0, prefix.lastIndexOf("_"));
        }
      }

      if (!prefix) return {};
      console.log("[Weather] Device prefix:", prefix);

      // Search all HA entities with this prefix
      const matching = haEntities.filter(e => e.entity_id.startsWith(prefix + "_"));
      console.log("[Weather] Matching entities:", matching.length);

      const result = {};
      const patterns = {
        temp: ["temperatur", "temperature", "actual_temp"],
        humidity: ["luftfeuchtigkeit", "humidity"],
        wind_speed: ["windgeschwindigkeit", "wind_speed"],
        wind_dir: ["windrichtung", "wind_dir"],
        rain: ["regenzahler", "rain_counter"],
        sun: ["sonnenscheindauer", "sunshineduration", "sunshine_duration"],
        lux: ["beleuchtungsstarke", "illumination", "illuminance", "lux"]
      };

      for (const [key, keywords] of Object.entries(patterns)) {
        // Find first matching entity (skip _2 variants for wind_dir)
        const match = matching.find(e => {
          const eid = e.entity_id.toLowerCase();
          if (key === "wind_dir" && eid.endsWith("_2")) return false;
          return keywords.some(kw => eid.includes(kw));
        });
        if (match) result[key] = match.entity_id;
      }

      return result;
    }

    // === AUTO-DETECT INDOOR SENSORS ===
    // Scans all rooms (except weather room) for temperature sensors
    function detectIndoorRooms(rooms, weatherRoomId) {
      const result = [];
      for (const room of rooms) {
        if (room.id === weatherRoomId) continue;
        if (!room.name || !room.devices) continue;

        const tempDev = room.devices.find(d =>
          d.entity_id.startsWith("sensor.") &&
          (d.entity_id.includes("temperatur") || d.entity_id.includes("temperature"))
        );
        if (!tempDev) continue;

        const humDev = room.devices.find(d =>
          d.entity_id.startsWith("sensor.") &&
          (d.entity_id.includes("luftfeuchtigkeit") || d.entity_id.includes("humidity"))
        );

        result.push({
          name: room.name,
          temp_id: tempDev.entity_id,
          hum_id: humDev ? humDev.entity_id : null
        });
      }
      return result;
    }

    // === UTILITY METER HELPERS ===
    function getRainEntity() {
      if (currentPeriod === "total") return outdoor.rain;
      const um = weatherCfg.utility_meters || {};
      const map = { daily: um.rain_daily, weekly: um.rain_weekly, monthly: um.rain_monthly };
      return map[currentPeriod] || outdoor.rain;
    }

    function getSunEntity() {
      if (currentPeriod === "total") return outdoor.sun;
      const um = weatherCfg.utility_meters || {};
      const map = { daily: um.sun_daily, weekly: um.sun_weekly, monthly: um.sun_monthly };
      return map[currentPeriod] || outdoor.sun;
    }

    // Wind direction number to compass
    function windDirLabel(deg) {
      if (deg === null || deg === undefined || isNaN(deg)) return "—";
      const dirs = ["N", "NNO", "NO", "ONO", "O", "OSO", "SO", "SSO", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
      return dirs[Math.round(parseFloat(deg) / 22.5) % 16];
    }

    // === THEME ===
    async function applyTheme() {
      let themeSetting = "auto";
      try {
        const stored = localStorage.getItem("fd-theme");
        if (stored) { themeSetting = stored; }
      } catch(e) {}
      if (themeSetting === "auto") {
        try {
          const res = await fetch("/api/settings");
          const s = await res.json();
          themeSetting = s.theme || "auto";
        } catch (e) {}
      }
      let resolved = themeSetting;
      if (themeSetting === "auto") {
        try {
          const res = await fetch("/api/ha/entities");
          const entities = await res.json();
          const sun = entities.find(e => e.entity_id === "sun.sun");
          if (sun) resolved = sun.state === "above_horizon" ? "light" : "dark";
          else throw new Error();
        } catch(e) {
          const h = new Date().getHours();
          resolved = (h >= 7 && h < 20) ? "light" : "dark";
        }
      }
      document.body.setAttribute("data-theme", resolved);
    }

    // === CLOCK ===
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
    }
    updateClock();
    setInterval(updateClock, 10000);

    // === CURRENT VALUES ===
    async function loadCurrentValues() {
      if (!outdoor.temp) return;
      try {
        const res = await fetch("/api/ha/entities");
        allEntities = await res.json();
        const val = (id) => {
          if (!id) return null;
          const e = allEntities.find(x => x.entity_id === id);
          return e && e.state !== "unavailable" && e.state !== "unknown" ? e.state : null;
        };

        // Outdoor values
        const temp = val(outdoor.temp);
        document.getElementById("wx-temp").textContent = temp ? `${parseFloat(temp).toFixed(1)} °C` : "—";

        const hum = val(outdoor.humidity);
        document.getElementById("wx-humidity").textContent = hum ? `${parseFloat(hum).toFixed(0)} %` : "—";

        const wind = val(outdoor.wind_speed);
        document.getElementById("wx-wind").textContent = wind ? `${parseFloat(wind).toFixed(1)} km/h` : "—";

        const wdir = val(outdoor.wind_dir);
        document.getElementById("wx-wind-dir").textContent = windDirLabel(wdir);

        const rain = val(getRainEntity());
        document.getElementById("wx-rain").textContent = rain ? `${parseFloat(rain).toFixed(1)} mm` : "—";
        document.getElementById("wx-rain-label").textContent = `Niederschlag ${PERIOD_LABELS[currentPeriod]}`;

        const sun = val(getSunEntity());
        document.getElementById("wx-sun").textContent = sun ? `${parseFloat(sun).toFixed(0)} min` : "—";
        document.getElementById("wx-sun-label").textContent = `Sonnenschein ${PERIOD_LABELS[currentPeriod]}`;

        // Show/hide reset buttons
        document.getElementById("reset-rain").style.display = currentPeriod === "total" ? "none" : "";
        document.getElementById("reset-sun").style.display = currentPeriod === "total" ? "none" : "";

        const lux = val(outdoor.lux);
        document.getElementById("wx-lux").textContent = lux ? `${parseFloat(lux).toFixed(0)} lx` : "—";

        // Indoor temps (dynamic)
        const container = document.getElementById("wx-indoor-items");
        if (indoorRooms.length === 0) {
          container.textContent = "—";
        } else {
          container.innerHTML = indoorRooms.map(r => {
            const t = val(r.temp_id);
            return `<span class="wx-indoor-item">${r.name} ${t ? parseFloat(t).toFixed(1) + "°" : "—"}</span>`;
          }).join("");
        }
      } catch (e) {
        console.error("Failed to load current values:", e);
      }
    }

    // === HISTORY / CHARTS ===
    function getChartColors() {
      const isDark = document.body.dataset.theme === "dark";
      return {
        grid: isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)",
        text: isDark ? "#888" : "#666",
        tempOut: "#f59e0b",
        humidity: "#5ba8f5",
        humIn: "#3ddc84",
        wind: "#60a5fa",
        rain: "#38bdf8"
      };
    }

    function parseHistory(historyData, entityId) {
      const series = historyData.find(arr => arr.length > 0 && arr[0].entity_id === entityId);
      if (!series) return [];
      return series
        .filter(p => p.state !== "unavailable" && p.state !== "unknown")
        .map(p => ({ x: new Date(p.last_changed).getTime(), y: parseFloat(p.state) }))
        .filter(p => !isNaN(p.y));
    }

    function chartOptions(yLabel, colors) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: colors.text, boxWidth: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              title: function(items) {
                if (!items.length) return "";
                const d = new Date(items[0].parsed.x);
                return d.toLocaleDateString("de-CH") + " " +
                  d.getHours().toString().padStart(2, "0") + ":" +
                  d.getMinutes().toString().padStart(2, "0");
              }
            }
          }
        },
        scales: {
          x: {
            type: "linear",
            ticks: {
              color: colors.text, font: { size: 10 }, maxTicksLimit: 8,
              callback: function(val) {
                const d = new Date(val);
                const h = d.getHours().toString().padStart(2, "0");
                const m = d.getMinutes().toString().padStart(2, "0");
                if (currentRange > 48) return d.getDate() + "." + (d.getMonth() + 1) + ". " + h + ":" + m;
                return h + ":" + m;
              }
            },
            grid: { color: colors.grid }
          },
          y: {
            ticks: { color: colors.text, font: { size: 10 } },
            grid: { color: colors.grid },
            title: { display: true, text: yLabel, color: colors.text, font: { size: 11 } }
          }
        }
      };
    }

    function makeDataset(label, data, color, fill) {
      return {
        label, data,
        borderColor: color,
        backgroundColor: fill ? color + "20" : "transparent",
        fill: !!fill,
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3
      };
    }

    async function loadCharts() {
      if (!outdoor.temp) return;

      // Collect all entity IDs for history
      const ids = [
        outdoor.temp, outdoor.humidity, outdoor.wind_speed, outdoor.rain,
        ...indoorRooms.map(r => r.temp_id),
        ...indoorRooms.filter(r => r.hum_id).map(r => r.hum_id)
      ].filter(Boolean).join(",");

      try {
        const res = await fetch(`/api/ha/history?entity_ids=${ids}&hours=${currentRange}`);
        const history = await res.json();
        if (history.error) { console.error("History API error:", history.error); return; }

        const c = getChartColors();
        Object.values(charts).forEach(ch => ch.destroy());
        charts = {};

        // Temperature chart: outdoor + all indoor rooms
        const tempDatasets = [
          makeDataset("Aussen", parseHistory(history, outdoor.temp), c.tempOut)
        ];
        indoorRooms.forEach((r, i) => {
          tempDatasets.push(
            makeDataset(r.name, parseHistory(history, r.temp_id), INDOOR_COLORS[i % INDOOR_COLORS.length])
          );
        });
        charts.temp = new Chart(document.getElementById("chart-temp"), {
          type: "line", data: { datasets: tempDatasets }, options: chartOptions("°C", c)
        });

        // Humidity chart: outdoor + indoor rooms that have humidity
        const humDatasets = [
          makeDataset("Aussen", parseHistory(history, outdoor.humidity), c.humidity)
        ];
        indoorRooms.forEach((r, i) => {
          if (r.hum_id) {
            humDatasets.push(
              makeDataset(r.name, parseHistory(history, r.hum_id), INDOOR_COLORS[i % INDOOR_COLORS.length])
            );
          }
        });
        charts.humidity = new Chart(document.getElementById("chart-humidity"), {
          type: "line", data: { datasets: humDatasets }, options: chartOptions("%", c)
        });

        // Wind chart
        charts.wind = new Chart(document.getElementById("chart-wind"), {
          type: "line",
          data: { datasets: [makeDataset("Geschwindigkeit", parseHistory(history, outdoor.wind_speed), c.wind, true)] },
          options: chartOptions("km/h", c)
        });

        // Rain chart
        charts.rain = new Chart(document.getElementById("chart-rain"), {
          type: "line",
          data: { datasets: [makeDataset("Niederschlag", parseHistory(history, outdoor.rain), c.rain, true)] },
          options: chartOptions("mm", c)
        });

      } catch (e) {
        console.error("Failed to load history:", e);
      }
    }

    function setRange(hours) {
      currentRange = hours;
      document.querySelectorAll(".wx-range-btn").forEach(btn => {
        btn.classList.toggle("active", parseInt(btn.dataset.hours) === hours);
      });
      loadCharts();
    }

    // === CUMULATIVE PERIOD + RESET ===
    function setCumPeriod(period) {
      currentPeriod = period;
      document.querySelectorAll(".wx-cum-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.period === period);
      });
      loadCurrentValues();
    }

    async function resetMeters(type) {
      const labels = { rain: "Niederschlag", sun: "Sonnenschein" };
      const periodLabel = PERIOD_LABELS[currentPeriod];
      if (!confirm(`${labels[type]} (${periodLabel}) wirklich zurücksetzen?`)) return;

      const entityId = type === "rain" ? getRainEntity() : getSunEntity();
      try {
        const res = await fetch("/api/ha/service/utility_meter/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ entity_id: entityId })
        });
        const result = await res.json();
        if (result.status === "ok") {
          const btn = document.getElementById(`reset-${type}`);
          btn.textContent = "✓";
          btn.classList.add("success");
          setTimeout(() => { btn.textContent = "↺"; btn.classList.remove("success"); }, 1500);
          loadCurrentValues();
        } else {
          alert("Fehler: " + (result.error || "unbekannt"));
        }
      } catch (e) {
        alert("Fehler: " + e.message);
      }
    }

    // === INIT ===
    async function init() {
      await applyTheme();

      try {
        const [settingsRes, configRes, entitiesRes] = await Promise.all([
          fetch("/api/settings"),
          fetch("/api/config"),
          fetch("/api/ha/entities")
        ]);
        settings = await settingsRes.json();
        const config = await configRes.json();
        const haEntities = await entitiesRes.json();

        weatherCfg = settings.weather;
        if (!weatherCfg || !weatherCfg.room) {
          document.querySelector(".wx-content").innerHTML =
            '<div style="text-align:center;padding:3rem;color:var(--text-dim)">Keine Wetterkonfiguration gefunden.<br><br>Bitte in Einstellungen unter "Wetter" einen Raum zuweisen.</div>';
          return;
        }

        // Find weather room in config
        const room = config.rooms.find(r => r.id === weatherCfg.room);
        if (!room) {
          document.querySelector(".wx-content").innerHTML =
            `<div style="text-align:center;padding:3rem;color:var(--text-dim)">Raum "${weatherCfg.room}" nicht in config.json gefunden.</div>`;
          return;
        }

        // Auto-detect outdoor entities via device prefix
        outdoor = detectOutdoorEntities(room.devices, haEntities);
        if (!outdoor.temp) {
          document.querySelector(".wx-content").innerHTML =
            `<div style="text-align:center;padding:3rem;color:var(--text-dim)">Keine Wetter-Entities im Raum "${room.name}" erkannt.<br>Mindestens ein Temperatur-Sensor muss vorhanden sein.</div>`;
          return;
        }
        console.log("[Weather] Outdoor entities:", outdoor);

        // Auto-detect indoor rooms
        indoorRooms = detectIndoorRooms(config.rooms, weatherCfg.room);
        console.log("[Weather] Indoor rooms:", indoorRooms.length);

      } catch (e) {
        console.error("Failed to load config:", e);
        return;
      }

      await loadCurrentValues();
      await loadCharts();
      setInterval(loadCurrentValues, 60000);
    }

    init();
  </script>
</body>
</html>
