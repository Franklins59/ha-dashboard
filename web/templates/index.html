<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>franklins dash</title>
  <link rel="icon" href="/static/logo.png" type="image/png">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/lib/Sortable.min.js"></script>
</head>
<body data-theme="dark">

  <!-- Connection overlay -->
  <div class="overlay" id="overlay">
    <img src="/static/logo.png" class="overlay-logo" alt="">
    <span class="overlay-text" id="overlay-text">Verbinde mit Home Assistant...</span>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img src="/static/logo.png" class="header-logo" alt="franklins">
      <div class="header-title">Dashboard</div>
    </div>
    <div class="header-center">
      <div class="header-building" id="building-name"></div>
    </div>
    <div class="header-right">
      <a href="/weather" class="theme-toggle" title="Wetterstation">🌤️</a>
      <a href="/energy" class="theme-toggle" title="Energie">⚡</a>
      <button class="theme-toggle" id="theme-toggle" title="Theme wechseln">☀️</button>
      <a href="/settings" class="theme-toggle" title="Einstellungen">⚙️</a>
      <button class="theme-toggle" id="edit-toggle" title="Anordnung bearbeiten" onclick="toggleEditMode()">✏️</button>
      <button class="edit-save-btn hidden" id="edit-save-btn" onclick="saveEditMode()">💾 Speichern</button>
      <span class="header-clock" id="clock"></span>
      <div class="status-bar">
        <span id="status-text">Getrennt</span>
        <div class="status-dot" id="status-dot"></div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="rooms-grid" id="rooms"></div>
    </div>
  </div>

  <!-- Climate Modal -->
  <div class="modal-backdrop hidden" id="climate-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="climate-modal-title">🌡️ Temperatur</span>
        <button class="modal-close" onclick="closeClimateModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="climate-current">
          <span class="climate-label">Aktuell</span>
          <span class="climate-current-value" id="climate-current">—</span>
        </div>
        <div class="climate-target">
          <span class="climate-label">Sollwert</span>
          <div class="climate-controls">
            <button class="climate-btn" onclick="adjustTarget(-0.5)">−</button>
            <span class="climate-target-value" id="climate-target">—</span>
            <button class="climate-btn" onclick="adjustTarget(+0.5)">+</button>
          </div>
          <input type="range" class="climate-slider" id="climate-slider" min="7" max="28" step="0.5" value="20" oninput="updateTargetDisplay(this.value)" onchange="setTargetTemp(this.value)">
        </div>
        <div class="climate-mode">
          <span class="climate-label">Modus</span>
          <div class="climate-mode-buttons">
            <button class="climate-mode-btn" data-mode="heat" onclick="setClimateMode('heat')">🔥 Heizen</button>
            <button class="climate-mode-btn" data-mode="off" onclick="setClimateMode('off')">⏹ Aus</button>
          </div>
        </div>
        <div class="climate-info">
          <span class="climate-label">Ventilstellung</span>
          <span class="climate-info-value" id="climate-output">—</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let ws = null;
    let settings = null;
    let config = null;
    let msgId = 1;
    let entityStates = {};
    let entityAttrs = {};
    let themeMode = "auto";
    let activeGroup = null;
    let climateEntityId = null;
    let editMode = false;
    let sortableInstances = [];

    const ICONS = {
      switch:  { on: "💡", off: "🔅" },
      light:   { on: "💡", off: "🔅" },
      cover:   { on: "🪟", off: "🪟" },
      input_boolean: { on: "✅", off: "⬜" },
      automation: { on: "✅", off: "⬜" },
      climate: { on: "🔥", off: "❄️" },
      scene: "🎬",
      sensor_temp: "🌡️",
      sensor_humidity: "💧",
      sensor_default: "📊"
    };

    // === THEME ===
    let sunState = null; // "above_horizon" or "below_horizon"

    async function fetchSunState() {
      try {
        const res = await fetch("/api/ha/entities");
        const entities = await res.json();
        const sun = entities.find(e => e.entity_id === "sun.sun");
        if (sun) sunState = sun.state;
      } catch(e) {}
    }

    function getAutoTheme() {
      if (sunState === "above_horizon") return "light";
      if (sunState === "below_horizon") return "dark";
      // Fallback if sun.sun unavailable
      const h = new Date().getHours();
      return (h >= 7 && h < 20) ? "light" : "dark";
    }

    function applyTheme() {
      const theme = themeMode === "auto" ? getAutoTheme() : themeMode;
      document.body.dataset.theme = theme;
      document.getElementById("theme-toggle").textContent =
        theme === "dark" ? "☀️" : "🌙";
    }

    function cycleTheme() {
      if (themeMode === "auto") themeMode = "dark";
      else if (themeMode === "dark") themeMode = "light";
      else themeMode = "auto";
      try { localStorage.setItem("fd-theme", themeMode); } catch(e) {}
      applyTheme();
    }

    // Load theme: localStorage override > settings.json
    function loadThemeOverride() {
      try {
        const stored = localStorage.getItem("fd-theme");
        if (stored) { themeMode = stored; return true; }
      } catch(e) {}
      return false;
    }

    document.getElementById("theme-toggle").addEventListener("click", cycleTheme);
    fetchSunState().then(() => applyTheme());
    setInterval(() => { fetchSunState().then(() => applyTheme()); }, 60000);

    // === CLOCK ===
    function updateClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hh}:${mm}`;
    }
    updateClock();
    setInterval(updateClock, 10000);

    // === BOOT ===
    async function init() {
      try {
        const [settingsRes, configRes] = await Promise.all([
          fetch("/api/settings"),
          fetch("/api/config")
        ]);
        settings = await settingsRes.json();
        config = await configRes.json();

        // Apply settings
        document.getElementById("building-name").textContent = settings.building || "";
        if (!loadThemeOverride()) {
          if (settings.theme) themeMode = settings.theme;
        }
        applyTheme();

        // Set default group (first in list)
        if (config.groups && config.groups.length > 0) {
          activeGroup = config.groups[0].id;
        }

        renderSidebar();
        renderRooms();
        connectHA();
      } catch (e) {
        showError("Konfiguration konnte nicht geladen werden.");
      }
    }

    // === SIDEBAR ===
    function renderSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.innerHTML = "";

      if (!config.groups || config.groups.length === 0) {
        sidebar.style.display = "none";
        return;
      }

      for (const group of config.groups) {
        const btn = document.createElement("button");
        btn.className = `sidebar-btn${group.id === activeGroup ? " active" : ""}`;
        btn.dataset.groupId = group.id;
        btn.innerHTML = `
          ${editMode ? '<span class="edit-drag-handle sidebar-handle">☰</span>' : ''}
          <span class="sidebar-icon">${group.icon || ""}</span>
          <span class="sidebar-label">${group.name}</span>
        `;
        btn.addEventListener("click", () => { if (!editMode) selectGroup(group.id); });
        sidebar.appendChild(btn);
      }

      // Make sidebar sortable in edit mode
      if (editMode) {
        sortableInstances.push(new Sortable(sidebar, {
          handle: ".sidebar-handle",
          animation: 150,
          ghostClass: "edit-ghost",
          chosenClass: "edit-chosen",
          onEnd: function() { /* order saved on explicit save */ }
        }));
      }
    }

    function selectGroup(groupId) {
      activeGroup = groupId;
      // Update sidebar active state
      document.querySelectorAll(".sidebar-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.groupId === groupId);
      });
      renderRooms();
      // Re-apply current states to rendered cards
      for (const entityId in entityStates) {
        updateDeviceUI(entityId, entityStates[entityId], entityAttrs[entityId]);
      }
    }

    function getVisibleRooms() {
      if (!config.groups || !activeGroup) return config.rooms;
      const group = config.groups.find(g => g.id === activeGroup);
      if (!group) return config.rooms;
      if (group.rooms.includes("*")) return config.rooms;
      return config.rooms.filter(r => group.rooms.includes(r.id));
    }

    // === RENDER ===
    function sensorIcon(dev) {
      if (dev.unit === "°C" || dev.unit === "°F") return ICONS.sensor_temp;
      if (dev.unit === "%") return ICONS.sensor_humidity;
      return ICONS.sensor_default;
    }

    function renderRooms() {
      // Destroy old sortable instances
      sortableInstances.forEach(s => s.destroy());
      sortableInstances = [];

      const container = document.getElementById("rooms");
      container.innerHTML = "";
      const visibleRooms = getVisibleRooms();

      for (const room of visibleRooms) {
        const roomEl = document.createElement("div");
        roomEl.className = "room";
        roomEl.dataset.roomId = room.id;
        roomEl.innerHTML = `<div class="room-title">${editMode ? '<span class="edit-drag-handle room-handle">☰</span> ' : ''}${room.icon || ""} ${room.name}</div>`;

        const grid = document.createElement("div");
        grid.className = "devices";
        grid.dataset.roomId = room.id;

        for (const dev of room.devices) {
          let card;
          if (dev.type === "switch" || dev.type === "light") card = createToggleCard(dev);
          else if (dev.type === "input_boolean" || dev.type === "automation") card = createToggleCard(dev);
          else if (dev.type === "cover") card = createCoverCard(dev);
          else if (dev.type === "sensor") card = createSensorCard(dev);
          else if (dev.type === "scene") card = createSceneCard(dev);
          else if (dev.type === "climate") card = createClimateCard(dev);
          if (card) {
            card.dataset.entityId = dev.entity_id;
            if (editMode) {
              const handle = document.createElement("span");
              handle.className = "edit-drag-handle device-handle";
              handle.textContent = "☰";
              card.insertBefore(handle, card.firstChild);
            }
            grid.appendChild(card);
          }
        }

        roomEl.appendChild(grid);
        container.appendChild(roomEl);

        // Make devices sortable within room
        if (editMode) {
          sortableInstances.push(new Sortable(grid, {
            handle: ".device-handle",
            animation: 150,
            ghostClass: "edit-ghost",
            chosenClass: "edit-chosen",
            onEnd: function() { /* order saved on explicit save */ }
          }));
        }
      }

      // Make rooms sortable within grid
      if (editMode) {
        sortableInstances.push(new Sortable(container, {
          handle: ".room-handle",
          animation: 150,
          ghostClass: "edit-ghost",
          chosenClass: "edit-chosen",
          onEnd: function() { /* order saved on explicit save */ }
        }));
      }
    }

    function createToggleCard(dev) {
      const card = document.createElement("div");
      card.className = "device toggleable";
      card.id = `dev-${dev.entity_id}`;
      card.dataset.entityId = dev.entity_id;
      card.dataset.type = dev.type;

      const icons = ICONS[dev.type] || ICONS.switch;
      card.innerHTML = `
        <div class="device-icon">${icons.off}</div>
        <div class="device-name">${dev.name}</div>
        <div class="device-state">—</div>
        ${dev.type === "light" ? `
        <div class="dimmer-row" style="display:none">
          <input type="range" class="dimmer-slider" min="0" max="255" value="0">
          <span class="dimmer-value">0%</span>
        </div>` : ""}
      `;

      card.addEventListener("click", (e) => {
        if (e.target.classList.contains("dimmer-slider")) return;
        toggleDevice(dev.entity_id, dev.type);
      });

      if (dev.type === "light") {
        const slider = card.querySelector(".dimmer-slider");
        if (slider) {
          slider.addEventListener("input", (e) => {
            card.querySelector(".dimmer-value").textContent =
              Math.round(parseInt(e.target.value) / 255 * 100) + "%";
          });
          slider.addEventListener("change", (e) => {
            setBrightness(dev.entity_id, parseInt(e.target.value));
          });
        }
      }

      return card;
    }

    function createCoverCard(dev) {
      const card = document.createElement("div");
      card.className = "device cover-card";
      card.id = `dev-${dev.entity_id}`;
      card.dataset.entityId = dev.entity_id;
      card.dataset.type = "cover";

      card.innerHTML = `
        <div class="device-icon">🪟</div>
        <div class="device-name">${dev.name}</div>
        <div class="device-state">—</div>
        <div class="cover-buttons">
          <button class="cover-btn" data-action="open">▲</button>
          <button class="cover-btn" data-action="stop">■</button>
          <button class="cover-btn" data-action="close">▼</button>
        </div>
        <div class="cover-position">
          <input type="range" class="cover-pos-slider" min="0" max="100" value="0">
          <span class="cover-pos-value">—</span>
        </div>
        <div class="cover-tilt" style="display:none">
          <div class="cover-tilt-label">Lamellen</div>
          <div class="cover-tilt-row">
            <input type="range" class="cover-tilt-slider" min="0" max="100" value="0">
            <span class="cover-tilt-value">—</span>
          </div>
        </div>
      `;

      card.querySelectorAll(".cover-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          coverAction(dev.entity_id, btn.dataset.action);
        });
      });

      const slider = card.querySelector(".cover-pos-slider");
      slider.addEventListener("change", (e) => {
        setCoverPosition(dev.entity_id, parseInt(e.target.value));
      });
      slider.addEventListener("input", (e) => {
        card.querySelector(".cover-pos-value").textContent = e.target.value + "%";
      });

      // Tilt slider events
      const tiltSlider = card.querySelector(".cover-tilt-slider");
      tiltSlider.addEventListener("change", (e) => {
        setCoverTiltPosition(dev.entity_id, parseInt(e.target.value));
      });
      tiltSlider.addEventListener("input", (e) => {
        card.querySelector(".cover-tilt-value").textContent = e.target.value + "%";
      });
      tiltSlider.addEventListener("click", (e) => e.stopPropagation());

      // Click on card toggles tilt panel (if tilt available)
      card.addEventListener("click", (e) => {
        if (editMode) return;
        if (e.target.closest(".cover-btn") || e.target.classList.contains("cover-pos-slider")) return;
        const tiltEl = card.querySelector(".cover-tilt");
        if (tiltEl && card.dataset.hasTilt === "true") {
          tiltEl.classList.toggle("expanded");
        }
      });

      return card;
    }

    function createSensorCard(dev) {
      const card = document.createElement("div");
      card.className = "device sensor-card";
      card.id = `dev-${dev.entity_id}`;
      card.dataset.entityId = dev.entity_id;
      card.dataset.type = "sensor";
      card.dataset.unit = dev.unit || "";

      card.innerHTML = `
        <div class="device-icon">${sensorIcon(dev)}</div>
        <div class="device-name">${dev.name}</div>
        <div class="sensor-value">—<span class="sensor-unit"> ${dev.unit || ""}</span></div>
      `;

      return card;
    }

    function createSceneCard(dev) {
      const card = document.createElement("div");
      card.className = "device scene-card";
      card.id = `dev-${dev.entity_id}`;
      card.dataset.entityId = dev.entity_id;
      card.dataset.type = "scene";

      card.innerHTML = `
        <div class="device-icon">${dev.icon || ICONS.scene}</div>
        <div class="device-name">${dev.name}</div>
        <div class="device-state">Antippen</div>
      `;

      card.addEventListener("click", () => {
        activateScene(dev.entity_id);
        // Visual feedback
        card.classList.add("activated");
        setTimeout(() => card.classList.remove("activated"), 800);
      });

      return card;
    }

    function createClimateCard(dev) {
      const card = document.createElement("div");
      card.className = "device climate-card";
      card.id = `dev-${dev.entity_id}`;
      card.dataset.entityId = dev.entity_id;
      card.dataset.type = "climate";
      card.dataset.name = dev.name;

      card.innerHTML = `
        <div class="device-icon">🌡️</div>
        <div class="device-name">${dev.name}</div>
        <div class="climate-card-temps">
          <span class="climate-card-current">—°C</span>
          <span class="climate-card-arrow">→</span>
          <span class="climate-card-target">—°C</span>
        </div>
        <div class="device-state">—</div>
      `;

      card.addEventListener("click", () => openClimateModal(dev.entity_id, dev.name));
      return card;
    }

    // === CLIMATE MODAL ===
    function openClimateModal(entityId, name) {
      if (editMode) return;
      climateEntityId = entityId;
      document.getElementById("climate-modal-title").textContent = `🌡️ ${name}`;

      const state = entityStates[entityId] || "unknown";
      const attrs = entityAttrs[entityId] || {};

      const current = attrs.current_temperature;
      document.getElementById("climate-current").textContent =
        current !== undefined ? `${current.toFixed(1)} °C` : "—";

      const target = attrs.temperature || 20;
      document.getElementById("climate-target").textContent = `${target.toFixed(1)} °C`;
      document.getElementById("climate-slider").value = target;
      document.getElementById("climate-slider").min = attrs.min_temp || 7;
      document.getElementById("climate-slider").max = attrs.max_temp || 28;
      document.getElementById("climate-slider").step = attrs.target_temp_step || 0.5;

      document.querySelectorAll(".climate-mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === state);
      });

      const output = attrs.control_output;
      document.getElementById("climate-output").textContent =
        output !== undefined ? `${output.toFixed(0)} %` : "—";

      document.getElementById("climate-modal").classList.remove("hidden");
    }

    function closeClimateModal() {
      document.getElementById("climate-modal").classList.add("hidden");
      climateEntityId = null;
    }

    function updateTargetDisplay(value) {
      document.getElementById("climate-target").textContent = `${parseFloat(value).toFixed(1)} °C`;
    }

    function adjustTarget(delta) {
      const slider = document.getElementById("climate-slider");
      const newVal = Math.max(parseFloat(slider.min),
        Math.min(parseFloat(slider.max), parseFloat(slider.value) + delta));
      slider.value = newVal;
      updateTargetDisplay(newVal);
      setTargetTemp(newVal);
    }

    function setTargetTemp(temp) {
      if (!climateEntityId) return;
      callService("climate", "set_temperature", climateEntityId, { temperature: parseFloat(temp) });
    }

    function setClimateMode(mode) {
      if (!climateEntityId) return;
      callService("climate", "set_hvac_mode", climateEntityId, { hvac_mode: mode });
      document.querySelectorAll(".climate-mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
    }

    document.getElementById("climate-modal").addEventListener("click", (e) => {
      if (e.target.classList.contains("modal-backdrop")) closeClimateModal();
    });

    // === HA WEBSOCKET ===
    function connectHA() {
      const haUrl = `ws://${settings.ha.url}:${settings.ha.port}/api/websocket`;
      ws = new WebSocket(haUrl);

      ws.onopen = () => console.log("WS connected");
      ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
      ws.onclose = () => {
        setStatus(false);
        showError("Verbindung zu HA verloren. Versuche erneut...");
        setTimeout(connectHA, 5000);
      };
      ws.onerror = () => setStatus(false);
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case "auth_required":
          ws.send(JSON.stringify({ type: "auth", access_token: settings.ha.token }));
          break;
        case "auth_ok":
          setStatus(true);
          hideOverlay();
          fetchStates();
          subscribeEvents();
          break;
        case "auth_invalid":
          showError("Token ungültig. Bitte config.json prüfen.");
          break;
        case "result":
          if (msg.result && Array.isArray(msg.result)) {
            for (const e of msg.result) {
              entityStates[e.entity_id] = e.state;
              entityAttrs[e.entity_id] = e.attributes || {};
              updateDeviceUI(e.entity_id, e.state, e.attributes);
            }
          }
          break;
        case "event":
          if (msg.event?.event_type === "state_changed" && msg.event.data?.new_state) {
            const d = msg.event.data;
            entityStates[d.entity_id] = d.new_state.state;
            entityAttrs[d.entity_id] = d.new_state.attributes || {};
            updateDeviceUI(d.entity_id, d.new_state.state, d.new_state.attributes);
            // Update theme on sunrise/sunset
            if (d.entity_id === "sun.sun") { sunState = d.new_state.state; applyTheme(); }
          }
          break;
      }
    }

    function fetchStates() {
      ws.send(JSON.stringify({ id: msgId++, type: "get_states" }));
    }

    function subscribeEvents() {
      ws.send(JSON.stringify({ id: msgId++, type: "subscribe_events", event_type: "state_changed" }));
    }

    // === ACTIONS ===
    function toggleDevice(entityId, type) {
      if (editMode) return;
      const domainMap = { light: "light", switch: "switch", input_boolean: "input_boolean", automation: "automation" };
      const domain = domainMap[type] || "switch";
      if (type === "input_boolean") {
        callService("input_boolean", "toggle", entityId);
      } else {
        const service = entityStates[entityId] === "on" ? "turn_off" : "turn_on";
        callService(domain, service, entityId);
      }
    }

    function activateScene(entityId) {
      if (editMode) return;
      callService("scene", "turn_on", entityId);
    }

    function setBrightness(entityId, brightness) {
      if (editMode) return;
      callService("light", "turn_on", entityId, { brightness });
    }

    function coverAction(entityId, action) {
      if (editMode) return;
      callService("cover", { open: "open_cover", close: "close_cover", stop: "stop_cover" }[action], entityId);
    }

    function setCoverPosition(entityId, position) {
      if (editMode) return;
      callService("cover", "set_cover_position", entityId, { position });
    }

    function setCoverTiltPosition(entityId, tiltPosition) {
      if (editMode) return;
      callService("cover", "set_cover_tilt_position", entityId, { tilt_position: tiltPosition });
    }

    function callService(domain, service, entityId, data) {
      const msg = { id: msgId++, type: "call_service", domain, service, target: { entity_id: entityId } };
      if (data) msg.service_data = data;
      ws.send(JSON.stringify(msg));
    }

    // === UI UPDATES ===
    function updateDeviceUI(entityId, state, attrs) {
      const card = document.getElementById(`dev-${entityId}`);
      if (!card) return;
      const type = card.dataset.type;
      attrs = attrs || {};

      if (type === "switch" || type === "light" || type === "input_boolean" || type === "automation") updateToggleUI(card, type, state, attrs);
      else if (type === "cover") updateCoverUI(card, state, attrs);
      else if (type === "sensor") updateSensorUI(card, state);
      else if (type === "climate") updateClimateUI(card, state, attrs);

      // Also update open modal if this entity is shown
      if (climateEntityId === entityId && type === "climate") {
        updateClimateModal(state, attrs);
      }
    }

    function updateToggleUI(card, type, state, attrs) {
      const icons = ICONS[type] || ICONS.switch;
      const isOn = state === "on";
      card.className = `device toggleable${isOn ? " on" : ""}`;
      card.querySelector(".device-icon").textContent = isOn ? icons.on : icons.off;

      if (type === "input_boolean" || type === "automation") {
        card.querySelector(".device-state").textContent = isOn ? "Aktiv" : "Inaktiv";
      } else {
        card.querySelector(".device-state").textContent = isOn ? "Ein" : "Aus";
      }

      if (type === "light") {
        const row = card.querySelector(".dimmer-row");
        const slider = card.querySelector(".dimmer-slider");
        if (row && slider) {
          if (isOn && attrs.brightness !== undefined) {
            row.style.display = "flex";
            slider.value = attrs.brightness;
            card.querySelector(".dimmer-value").textContent =
              Math.round(attrs.brightness / 255 * 100) + "%";
          } else {
            row.style.display = "none";
          }
        }
      }
    }

    function updateCoverUI(card, state, attrs) {
      const pos = attrs.current_position;
      card.className = `device cover-card${state === "open" ? " open" : ""}`;

      const labels = { open: "Offen", closed: "Geschlossen", opening: "Öffnet...", closing: "Schliesst..." };
      card.querySelector(".device-state").textContent = labels[state] || "—";

      if (pos !== undefined && pos !== null) {
        card.querySelector(".cover-pos-slider").value = pos;
        card.querySelector(".cover-pos-value").textContent = pos + "%";
      }

      // Auto-detect tilt support
      const tiltEl = card.querySelector(".cover-tilt");
      if (tiltEl && attrs.current_tilt_position !== undefined && attrs.current_tilt_position !== null) {
        card.dataset.hasTilt = "true";
        tiltEl.style.display = "";
        card.querySelector(".cover-tilt-slider").value = attrs.current_tilt_position;
        card.querySelector(".cover-tilt-value").textContent = attrs.current_tilt_position + "%";
      }
    }

    function updateSensorUI(card, state) {
      const unit = card.dataset.unit || "";
      const valEl = card.querySelector(".sensor-value");
      if (state === "unavailable" || state === "unknown") {
        valEl.innerHTML = `—<span class="sensor-unit"> ${unit}</span>`;
      } else {
        const num = parseFloat(state);
        valEl.innerHTML = `${isNaN(num) ? state : num.toFixed(1)}<span class="sensor-unit"> ${unit}</span>`;
      }
    }

    function updateClimateUI(card, state, attrs) {
      const isHeating = state === "heat";
      card.className = `device climate-card${isHeating ? " heating" : ""}`;

      const current = attrs.current_temperature;
      const target = attrs.temperature;
      card.querySelector(".climate-card-current").textContent =
        current !== undefined ? `${current.toFixed(1)}°C` : "—";
      card.querySelector(".climate-card-target").textContent =
        target !== undefined ? `${target.toFixed(1)}°C` : "—";

      const hvacAction = attrs.hvac_action || state;
      const labels = { heating: "Heizt", idle: "Bereit", off: "Aus" };
      card.querySelector(".device-state").textContent = labels[hvacAction] || state;
    }

    function updateClimateModal(state, attrs) {
      const current = attrs.current_temperature;
      document.getElementById("climate-current").textContent =
        current !== undefined ? `${current.toFixed(1)} °C` : "—";

      const output = attrs.control_output;
      document.getElementById("climate-output").textContent =
        output !== undefined ? `${output.toFixed(0)} %` : "—";

      document.querySelectorAll(".climate-mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === state);
      });
    }

    // === EDIT MODE ===
    function toggleEditMode() {
      editMode = !editMode;
      document.body.classList.toggle("edit-mode", editMode);
      document.getElementById("edit-toggle").classList.toggle("edit-active", editMode);
      document.getElementById("edit-save-btn").classList.toggle("hidden", !editMode);

      // Re-render with/without drag handles
      renderRooms();
      renderSidebar();
      // Re-apply states
      for (const entityId in entityStates) {
        updateDeviceUI(entityId, entityStates[entityId], entityAttrs[entityId]);
      }
    }

    async function saveEditMode() {
      // Collect new group order from sidebar
      const sidebarBtns = document.querySelectorAll(".sidebar-btn");
      const newGroupOrder = [];
      sidebarBtns.forEach(btn => {
        const groupId = btn.dataset.groupId;
        const group = config.groups.find(g => g.id === groupId);
        if (group) newGroupOrder.push(group);
      });

      // Collect new room order within current group view
      const roomEls = document.querySelectorAll(".rooms-grid .room");
      const reorderedRoomIds = [];
      roomEls.forEach(el => {
        reorderedRoomIds.push(el.dataset.roomId);
      });

      // Collect new entity order within each visible room
      const deviceGrids = document.querySelectorAll(".devices[data-room-id]");
      const roomDeviceUpdates = {};
      deviceGrids.forEach(grid => {
        const roomId = grid.dataset.roomId;
        const entityIds = [];
        grid.querySelectorAll(".device").forEach(card => {
          if (card.dataset.entityId) entityIds.push(card.dataset.entityId);
        });
        roomDeviceUpdates[roomId] = entityIds;
      });

      // Apply group reorder
      if (newGroupOrder.length > 0) {
        config.groups = newGroupOrder;
      }

      // Apply room reorder: reposition rooms in config.rooms based on visible order
      if (reorderedRoomIds.length > 0) {
        const activeGroupObj = config.groups.find(g => g.id === activeGroup);
        if (activeGroupObj && !activeGroupObj.rooms.includes("*")) {
          activeGroupObj.rooms = reorderedRoomIds;
        }
      }

      // Apply entity reorder within rooms
      for (const [roomId, entityIds] of Object.entries(roomDeviceUpdates)) {
        const room = config.rooms.find(r => r.id === roomId);
        if (room) {
          const newDevices = [];
          for (const eid of entityIds) {
            const dev = room.devices.find(d => d.entity_id === eid);
            if (dev) newDevices.push(dev);
          }
          // Keep any devices not visible (shouldn't happen, but safety)
          for (const dev of room.devices) {
            if (!entityIds.includes(dev.entity_id)) newDevices.push(dev);
          }
          room.devices = newDevices;
        }
      }

      // Save to server
      try {
        const res = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(config)
        });
        const result = await res.json();
        if (result.status === "ok") {
          // Exit edit mode
          toggleEditMode();
        }
      } catch (e) {
        console.error("Save failed:", e);
      }
    }

    // === HELPERS ===
    function setStatus(connected) {
      document.getElementById("status-dot").className = `status-dot${connected ? " connected" : ""}`;
      document.getElementById("status-text").textContent = connected ? "Verbunden" : "Getrennt";
    }

    function hideOverlay() {
      document.getElementById("overlay").classList.add("hidden");
    }

    function showError(text) {
      const el = document.getElementById("overlay-text");
      el.className = "error-msg";
      el.textContent = text;
      document.getElementById("overlay").classList.remove("hidden");
    }

    // === GO ===
    // Prevent overscroll/bounce on body, allow inside .main and .sidebar
    document.addEventListener("touchmove", function(e) {
      if (!e.target.closest(".main") && !e.target.closest(".sidebar")) {
        e.preventDefault();
      }
    }, { passive: false });

    init();
  </script>
</body>
</html>
