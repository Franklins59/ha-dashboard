<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>franklins dash — Einstellungen</title>
  <link rel="icon" href="/static/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/settings.css">
</head>
<body data-theme="dark">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <a href="/" class="back-btn" title="Zurück zum Dashboard">←</a>
      <img src="/static/logo.png" class="header-logo" alt="franklins">
      <div class="header-title">Einstellungen</div>
    </div>
    <div class="header-right">
      <div class="status-bar">
        <span id="status-text">—</span>
        <div class="status-dot" id="status-dot"></div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="system">⚙️ System</button>
    <button class="tab" data-tab="entities">🔍 Entity-Browser</button>
    <button class="tab" data-tab="config">🏠 Konfiguration</button>
  </div>

  <!-- Tab content -->
  <div class="tab-content">

    <!-- System Settings -->
    <div class="tab-panel active" id="panel-system">
      <div class="panel-section">
        <h3>Gebäude</h3>
        <div class="form-row">
          <label>Name</label>
          <input type="text" id="s-building" placeholder="Mein Haus">
        </div>
      </div>
      <div class="panel-section">
        <h3>Home Assistant</h3>
        <div class="form-row">
          <label>IP-Adresse</label>
          <input type="text" id="s-ha-url" placeholder="192.168.1.20">
        </div>
        <div class="form-row">
          <label>Port</label>
          <input type="number" id="s-ha-port" placeholder="8123">
        </div>
        <div class="form-row">
          <label>Token</label>
          <input type="password" id="s-ha-token" placeholder="Long-Lived Access Token">
          <button class="btn-small" onclick="toggleTokenVisibility()">👁️</button>
        </div>
        <div class="form-row">
          <button class="btn" onclick="testHAConnection()">Verbindung testen</button>
          <span class="test-result" id="ha-test-result"></span>
        </div>
      </div>
      <div class="panel-section">
        <h3>Darstellung</h3>
        <div class="form-row">
          <label>Theme</label>
          <select id="s-theme" onchange="applyTheme(this.value)">
            <option value="auto">Automatisch (Tag/Nacht)</option>
            <option value="light">Hell</option>
            <option value="dark">Dunkel</option>
          </select>
        </div>
      </div>
      <div class="panel-actions">
        <button class="btn btn-primary" onclick="saveSettings()">Speichern</button>
        <span class="save-result" id="settings-save-result"></span>
      </div>
    </div>

    <!-- Entity Browser -->
    <div class="tab-panel" id="panel-entities">
      <div class="panel-section">
        <div class="entity-toolbar">
          <input type="text" id="entity-search" placeholder="Suchen (z.B. light, cover, büro...)" oninput="filterEntities()">
          <select id="entity-domain-filter" onchange="filterEntities()">
            <option value="">Alle Domains</option>
          </select>
          <button class="btn" onclick="loadEntities()">Aktualisieren</button>
        </div>
        <div class="entity-stats" id="entity-stats"></div>
      </div>
      <div class="entity-list" id="entity-list">
        <div class="entity-placeholder">Klicke "Aktualisieren" um Entities von HA zu laden.</div>
      </div>
    </div>

    <!-- Config Editor -->
    <div class="tab-panel" id="panel-config">
      <div class="panel-section">
        <div class="config-toolbar">
          <h3>Konfiguration (config.json)</h3>
          <div class="config-toolbar-actions">
            <button class="btn" onclick="loadConfigEditor()">Neu laden</button>
            <button class="btn btn-primary" onclick="saveConfig()">Speichern</button>
            <span class="save-result" id="config-save-result"></span>
          </div>
        </div>
        <p class="hint">Direkte Bearbeitung der config.json. Vorsicht: Ungültiges JSON führt zu Fehlern.</p>
        <textarea id="config-editor" spellcheck="false"></textarea>
      </div>
    </div>

  </div>

  <script>
    // === STATE ===
    let allEntities = [];

    // === TABS ===
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add("active");

        // Auto-load on first visit
        if (tab.dataset.tab === "entities" && allEntities.length === 0) loadEntities();
        if (tab.dataset.tab === "config") loadConfigEditor();
      });
    });

    // === SYSTEM SETTINGS ===
    async function loadSettings() {
      try {
        const res = await fetch("/api/settings");
        const s = await res.json();
        document.getElementById("s-building").value = s.building || "";
        document.getElementById("s-ha-url").value = s.ha?.url || "";
        document.getElementById("s-ha-port").value = s.ha?.port || 8123;
        document.getElementById("s-ha-token").value = s.ha?.token || "";
        document.getElementById("s-theme").value = s.theme || "auto";
        setStatus(true);
      } catch (e) {
        setStatus(false);
      }
    }

    async function saveSettings() {
      const data = {
        building: document.getElementById("s-building").value,
        ha: {
          url: document.getElementById("s-ha-url").value,
          port: parseInt(document.getElementById("s-ha-port").value) || 8123,
          token: document.getElementById("s-ha-token").value
        },
        theme: document.getElementById("s-theme").value
      };
      try {
        const res = await fetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        showResult("settings-save-result", result.status === "ok" ? "Gespeichert ✓" : "Fehler", result.status === "ok");
      } catch (e) {
        showResult("settings-save-result", "Fehler: " + e.message, false);
      }
    }

    async function testHAConnection() {
      const resultEl = document.getElementById("ha-test-result");
      resultEl.textContent = "Teste...";
      resultEl.className = "test-result";
      try {
        const res = await fetch("/api/ha/entities");
        if (res.ok) {
          const entities = await res.json();
          if (entities.error) {
            resultEl.textContent = "Fehler: " + entities.error;
            resultEl.classList.add("error");
          } else {
            resultEl.textContent = `Verbunden ✓ (${entities.length} Entities)`;
            resultEl.classList.add("success");
          }
        } else {
          resultEl.textContent = "Verbindung fehlgeschlagen";
          resultEl.classList.add("error");
        }
      } catch (e) {
        resultEl.textContent = "Fehler: " + e.message;
        resultEl.classList.add("error");
      }
    }

    function toggleTokenVisibility() {
      const el = document.getElementById("s-ha-token");
      el.type = el.type === "password" ? "text" : "password";
    }

    // === ENTITY BROWSER ===
    async function loadEntities() {
      const list = document.getElementById("entity-list");
      list.innerHTML = '<div class="entity-placeholder">Lade Entities...</div>';
      try {
        const res = await fetch("/api/ha/entities");
        allEntities = await res.json();
        if (allEntities.error) {
          list.innerHTML = `<div class="entity-placeholder error">Fehler: ${allEntities.error}</div>`;
          return;
        }
        populateDomainFilter();
        filterEntities();
        document.getElementById("entity-stats").textContent = `${allEntities.length} Entities geladen`;
      } catch (e) {
        list.innerHTML = `<div class="entity-placeholder error">Fehler: ${e.message}</div>`;
      }
    }

    function populateDomainFilter() {
      const domains = [...new Set(allEntities.map(e => e.domain))].sort();
      const select = document.getElementById("entity-domain-filter");
      select.innerHTML = '<option value="">Alle Domains</option>';
      for (const d of domains) {
        const count = allEntities.filter(e => e.domain === d).length;
        select.innerHTML += `<option value="${d}">${d} (${count})</option>`;
      }
    }

    function filterEntities() {
      const search = document.getElementById("entity-search").value.toLowerCase();
      const domain = document.getElementById("entity-domain-filter").value;
      const list = document.getElementById("entity-list");

      let filtered = allEntities;
      if (domain) filtered = filtered.filter(e => e.domain === domain);
      if (search) filtered = filtered.filter(e =>
        e.entity_id.toLowerCase().includes(search) ||
        e.friendly_name.toLowerCase().includes(search)
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="entity-placeholder">Keine Treffer</div>';
        return;
      }

      list.innerHTML = filtered.map(e => `
        <div class="entity-row" onclick="copyEntityId('${e.entity_id}')">
          <span class="entity-domain">${e.domain}</span>
          <span class="entity-id">${e.entity_id}</span>
          <span class="entity-name">${e.friendly_name}</span>
          <span class="entity-state">${e.state}</span>
          <button class="btn-copy" title="Entity-ID kopieren">📋</button>
        </div>
      `).join("");

      document.getElementById("entity-stats").textContent =
        `${filtered.length} von ${allEntities.length} Entities`;
    }

    function copyEntityId(id) {
      navigator.clipboard.writeText(id).then(() => {
        // Brief visual feedback
        const rows = document.querySelectorAll(".entity-row");
        rows.forEach(r => {
          if (r.querySelector(".entity-id").textContent === id) {
            r.classList.add("copied");
            setTimeout(() => r.classList.remove("copied"), 600);
          }
        });
      });
    }

    // === CONFIG EDITOR ===
    async function loadConfigEditor() {
      try {
        const res = await fetch("/api/config");
        const config = await res.json();
        document.getElementById("config-editor").value = JSON.stringify(config, null, 2);
      } catch (e) {
        document.getElementById("config-editor").value = "Fehler beim Laden: " + e.message;
      }
    }

    async function saveConfig() {
      const editor = document.getElementById("config-editor");
      let data;
      try {
        data = JSON.parse(editor.value);
      } catch (e) {
        showResult("config-save-result", "Ungültiges JSON: " + e.message, false);
        return;
      }
      try {
        const res = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        showResult("config-save-result", result.status === "ok" ? "Gespeichert ✓" : "Fehler", result.status === "ok");
      } catch (e) {
        showResult("config-save-result", "Fehler: " + e.message, false);
      }
    }

    // === HELPERS ===
    function showResult(elId, text, success) {
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = `save-result ${success ? "success" : "error"}`;
      setTimeout(() => { el.textContent = ""; }, 3000);
    }

    function setStatus(connected) {
      document.getElementById("status-dot").className = `status-dot${connected ? " connected" : ""}`;
      document.getElementById("status-text").textContent = connected ? "Verbunden" : "Getrennt";
    }

    // === THEME ===
    function getAutoTheme() {
      const h = new Date().getHours();
      return (h >= 7 && h < 20) ? "light" : "dark";
    }

    function applyTheme(theme) {
      const resolved = theme === "auto" ? getAutoTheme() : theme;
      document.body.dataset.theme = resolved;
    }

    // === INIT ===
    loadSettings().then(() => {
      applyTheme(document.getElementById("s-theme").value || "auto");
    });
  </script>
</body>
</html>
